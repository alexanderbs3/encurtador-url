version: '3.8'

services:
  # Serviço do Banco de Dados Relacional
  mysql:
    image: mysql:8.0.44
    container_name: encurtador-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: encurtador_db
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  # Serviço do Banco de Dados em Memória (Cache)
  redis:
    image: redis:7-alpine
    container_name: encurtador-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

# Declaração dos volumes para persistência de dados fora do contêiner
volumes:
  mysql_data:
  redis_data: